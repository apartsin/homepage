<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Student course project outcomes in Hands-On AI Science courses.">
  <title>Hands-On AI Science - Student Course Projects | Sasha Apartsin</title>
  <link rel="stylesheet" href="../shared/site-shell.css">
  <link rel="stylesheet" href="../shared/unified-theme.css">
  <link rel="stylesheet" href="../shared/cards.css">
  <link rel="stylesheet" href="../shared/card-types/student-project.css">
  <link rel="stylesheet" href="../shared/student-projects-catalog.css">
</head>
<body class="apartsin-shell-active" data-site-section="teaching" data-card-type="student-project">
  <div class="apartsin-shell">
    <aside class="apartsin-shell__sidebar">
      <a class="apartsin-shell__brand" href="../index.html">Sasha Apartsin</a>
      <div class="apartsin-shell__divider"></div>
      <nav class="apartsin-shell__nav">
        <a href="../about/academic-profile.html">About</a>
        <a href="../research/interests.html">Research</a>
        <a href="../teaching/overview.html">Teaching</a>
        <a href="../work/overview.html">Building</a>
        <a href="../work/innovation-overview.html">Innovations</a>
        <a href="../writing/overview.html">Writing</a>
      </nav>
    </aside>
    <div class="apartsin-shell__content">
      <main class="apartsin-shell__main">
        <section class="hub-page">
          <p class="hub-page__kicker">Teaching</p>
          <h1 class="hub-page__title">Hands-On AI Science - Student Course Projects</h1>
          <p class="hub-page__lede">A unified catalog of student projects across course offerings, workshops, and institutions.</p>
        </section>
        <section class="student-projects-toolbar" aria-label="Project filters">
          <div class="student-projects-toolbar__controls">
            <label class="student-projects-toolbar__field">
              <span class="student-projects-toolbar__field-label"><a href="./hands-on-ai-science-courses-courses.html">HoS AI</a> Course</span>
              <select id="student-project-filter-type">
                <option value="all">All types</option>
              </select>
            </label>
            <label class="student-projects-toolbar__field">
              <span class="student-projects-toolbar__field-label">Institution</span>
              <select id="student-project-filter-institution">
                <option value="all">All institutions</option>
              </select>
            </label>
            <label class="student-projects-toolbar__field">
              <span class="student-projects-toolbar__field-label">Year</span>
              <select id="student-project-filter-year">
                <option value="all">All years</option>
              </select>
            </label>
            <label class="student-projects-toolbar__field">
              <span class="student-projects-toolbar__field-label">Semester</span>
              <select id="student-project-filter-semester">
                <option value="all">All semesters</option>
              </select>
            </label>
            <button type="button" class="student-projects-toolbar__reset" id="student-project-filter-reset">Reset Filters</button>
          </div>
          <p class="student-projects-toolbar__status" id="student-project-status">Loading projects...</p>
        </section>
        <section class="cards-shell cards-shell--collection student-projects-shell" aria-label="All student project cards" data-disable-toolbar="true">
          <div class="cards-grid" id="student-projects-grid"></div>
        </section>
      </main>
    </div>
  </div>
  <script defer src="../shared/unified-enhance.js"></script>
  <script defer src="../shared/site-shell.js"></script>
  <script defer src="./hands-on-ai-science-courses-student-projects.data.js"></script>
  <script defer src="./hands-on-ai-science-courses-student-projects.js"></script>
</body>
</html>
