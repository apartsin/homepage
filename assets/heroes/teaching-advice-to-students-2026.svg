<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Compass illustration symbolizing career direction">
  <defs>
    <radialGradient id="dial" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FAF3EB"/>
      <stop offset="100%" stop-color="#E8C8A0"/>
    </radialGradient>
    <linearGradient id="needleN" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E78A4A"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </linearGradient>
    <linearGradient id="needleS" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3D5A80"/>
      <stop offset="100%" stop-color="#2C3E5A"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" fill="#FFFFFF"/>

  <!-- outer ring -->
  <circle cx="256" cy="256" r="200" fill="#FAF3EB" stroke="#8C6A4A" stroke-width="8"/>
  <circle cx="256" cy="256" r="184" fill="none" stroke="#8C6A4A" stroke-width="2"/>

  <!-- cardinal tick marks -->
  <g stroke="#2C3E5A" stroke-width="4" stroke-linecap="round">
    <line x1="256" y1="80"  x2="256" y2="110"/>
    <line x1="256" y1="402" x2="256" y2="432"/>
    <line x1="80"  y1="256" x2="110" y2="256"/>
    <line x1="402" y1="256" x2="432" y2="256"/>
  </g>

  <!-- intercardinal tick marks (shorter) -->
  <g stroke="#8C6A4A" stroke-width="2" stroke-linecap="round">
    <line x1="131" y1="131" x2="151" y2="151"/>
    <line x1="381" y1="131" x2="361" y2="151"/>
    <line x1="131" y1="381" x2="151" y2="361"/>
    <line x1="381" y1="381" x2="361" y2="361"/>
  </g>

  <!-- cardinal letters -->
  <g font-family="Georgia, serif" font-size="26" font-weight="700" fill="#2C3E5A" text-anchor="middle">
    <text x="256" y="72">N</text>
    <text x="256" y="460" dominant-baseline="middle">S</text>
    <text x="62"  y="266">W</text>
    <text x="450" y="266">E</text>
  </g>

  <!-- inner dial -->
  <circle cx="256" cy="256" r="150" fill="url(#dial)" stroke="#8C6A4A" stroke-width="3"/>

  <!-- needle (north tip in warm orange, south tail in slate blue), rotated to point NE / "forward" -->
  <g transform="rotate(35 256 256)">
    <polygon points="256,116 240,256 272,256" fill="url(#needleN)" stroke="#8C6A4A" stroke-width="1.5"/>
    <polygon points="256,396 240,256 272,256" fill="url(#needleS)" stroke="#8C6A4A" stroke-width="1.5"/>
  </g>

  <!-- center pin -->
  <circle cx="256" cy="256" r="14" fill="#FAF3EB" stroke="#8C6A4A" stroke-width="3"/>
  <circle cx="256" cy="256" r="6" fill="#2C3E5A"/>
</svg>
