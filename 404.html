<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting | Sasha Apartsin</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .wrap {
      width: min(560px, calc(100% - 48px));
      padding: 24px;
      border: 1px solid #dbe3ef;
      border-radius: 14px;
      background: #ffffff;
      box-shadow: 0 10px 30px rgba(31, 41, 55, 0.08);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 1.2rem;
    }
    p {
      margin: 8px 0;
      line-height: 1.55;
    }
    a {
      color: #1d4ed8;
      font-weight: 600;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Page Redirect</h1>
    <p>This page moved while the site was unified.</p>
    <p>If you are not redirected automatically, open <a id="fallback-link" href="/">the home page</a>.</p>
  </div>
  <script>
    (function () {
      var path = window.location.pathname || '/';
      var targetPath = '';

      if (path === '/onesite' || path === '/onesite/') {
        targetPath = '/';
      } else if (path.indexOf('/onesite/') === 0) {
        targetPath = path.slice('/onesite'.length) || '/';
      } else if (path.indexOf('/homepage/onesite/') === 0) {
        targetPath = path.slice('/homepage/onesite'.length) || '/';
      }

      if (targetPath) {
        var target = targetPath + (window.location.search || '') + (window.location.hash || '');
        window.location.replace(target);
        return;
      }

      var fallback = document.getElementById('fallback-link');
      if (fallback) {
        fallback.href = '/';
      }
    })();
  </script>
</body>
</html>
